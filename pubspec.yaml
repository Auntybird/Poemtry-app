name: poem_app
description: Voice-to-poem app channeling the Nine Schools of Chinese philosophy
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  record: ^6.0.0
  permission_handler: ^12.0.3
  http: ^1.2.2
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2

dependency_overrides:
  record_platform_interface: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true