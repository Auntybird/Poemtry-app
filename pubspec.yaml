name: poem_app
description: Voice-to-poem app channeling the Nine Schools of Chinese philosophy
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  record: ^6.0.0
  permission_handler: ^12.0.3
  http: ^1.2.2
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  fl_chart: ^1.2.0
  flutter_tts: ^4.0.2 
  share_plus: ^10.1.0
  google_generative_ai: ^0.4.7
  flutter_launcher_icons: "^0.14.1"
  audioplayers: ^6.1.0

dependency_overrides:
  record_platform_interface: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "lib/assets/icon.png" # Updated to reflect your folder structure
  min_sdk_android: 21

